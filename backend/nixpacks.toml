[phases.setup]
aptPkgs = ["ffmpeg", "libgl1-mesa-glx", "libglib2.0-0", "python3", "python3-pip", "python3-venv"]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
